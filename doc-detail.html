<div class="ipad-frame" id="app">
  <!-- ===== File Detail Page ===== -->
  <div class="file-detail-page">
    <!-- Top Bar -->
    <div class="fd-topbar">
      <button class="fd-back-btn" id="fdBackBtn" title="返回日历视图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="fd-topbar-center">
        <div class="fd-title" id="fdTitle">A班7月6日作业</div>
        <div class="fd-time" id="fdTime">分发时间：2026-07-06 08:30</div>
      </div>
      <button class="fd-save-btn" id="fdSaveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        保存
      </button>
    </div>

    <!-- Scrollable Content -->

      <!-- Questions rendered by JS -->
    </div>
  </div>

  <!-- ===== Answer Modal ===== -->
  <div class="answer-modal-overlay" id="answerModalOverlay">
    <div class="answer-modal">
      <div class="answer-modal-header">
        <span class="answer-modal-title">答案与解析</span>
        <button class="answer-modal-close" id="answerModalClose">✕</button>
      </div>

    </div>

<script>
(function() {
  // ===== Read URL params =====
  var urlParams = new URLSearchParams(window.location.search);
  var cardTitle = urlParams.get('title') || 'A班7月6日作业';
  document.getElementById('fdTitle').textContent = cardTitle;
  document.title = cardTitle + ' - 考研超级课表';

  // ===== State =====
  var uploadFiles = [];
  var questionScores = {};   // { questionId: 'right'|'half'|'wrong' }
  var errorReasons = {};     // { questionId: [reasons] }
  var questionNotes = {};    // { questionId: {text, photoUrl} }

  // ===== Math Question Bank =====
  var questionBank = [
    { id:1, text:'设函数 f(x) = ln(x+1) - ax，若 f(x) 在区间 (0,+∞) 上单调递减，则实数 a 的取值范围是（  ）', opts:['A. a ≥ 0','B. a ≥ 1/2','C. a ≥ 1','D. a > 1'], answer:'C', explain:'f\'(x) = 1/(x+1) - a。f(x) 在 (0,+∞) 递减 ⇔ f\'(x) ≤ 0 对 ∀x>0 恒成立，即 1/(x+1) ≤ a。x>0 时 1/(x+1) < 1，其上确界为 1，故需 a ≥ 1，选 C。' },
    { id:2, text:'在 △ABC 中，已知 sin²B - sin²C - sin²A = sinA·sinC，则角 B 的大小为（  ）', opts:['A. 150°','B. 120°','C. 60°','D. 30°'], answer:'B', explain:'由正弦定理 sinA/a = sinB/b = sinC/c = k。代入得 b² - c² - a² = ac ⇒ b² = a² + c² + ac。由余弦定理 b² = a² + c² - 2ac·cosB，故 -2cosB = 1，cosB = -1/2，因此 B = 120°，选 B。' },
    { id:3, text:'已知椭圆 C: x²/4 + y²/3 = 1 的左、右焦点分别为 F₁、F₂，过 F₁ 且倾斜角为 45° 的直线 l 与椭圆交于 A、B 两点，则 △ABF₂ 的周长为（  ）', opts:['A. 4','B. 6','C. 8','D. 10'], answer:'C', explain:'椭圆 a²=4⇒a=2，c²=a²-b²=1⇒c=1，F₁(-1,0)、F₂(1,0)。直线 l: y=x+1。由椭圆第三定义，△ABF₂ 周长 = 4a = 8（椭圆的焦点三角形性质：过左焦点的弦与右焦点构成的三角形周长恒为 4a），选 C。' },
    { id:4, text:'设数列 {aₙ} 满足 a₁ = 1，aₙ₊₁ = 2aₙ + 3ⁿ，则其通项公式 aₙ =（  ）', opts:['A. 3ⁿ - 2ⁿ','B. 3ⁿ⁺¹ - 2ⁿ','C. 3ⁿ - 2ⁿ⁺¹','D. 2·3ⁿ - 2ⁿ⁺¹'], answer:'A', explain:'递推变形：aₙ₊₁ - 3ⁿ⁺¹ = 2(aₙ - 3ⁿ)。令 bₙ = aₙ - 3ⁿ，则 b₁ = 1-3 = -2，且 bₙ₊₁ = 2bₙ，故 {bₙ} 为等比数列：bₙ = -2·2ⁿ⁻¹ = -2ⁿ。因此 aₙ = 3ⁿ - 2ⁿ，选 A。' },
    { id:5, text:'已知 x>0, y>0 且 1/x + 1/y = 1，则 x + 4y 的最小值为（  ）', opts:['A. 9','B. 10','C. 11','D. 12'], answer:'A', explain:'由 1/x+1/y=1⇒xy = x+y⇒(x-1)(y-1)=1。x+4y = (x-1)+4(y-1)+5 = t+4/t+5 ≥ 2√4+5 = 9，当 x-1=2(y-1) 即 t=2 时取"="。验证：t=x-1=2⇒x=3,y=2，1/3+1/2=5/6≠1。重解：1/x+1/y=1⇒y=x/(x-1)。x+4y=x+4x/(x-1)=x+4(x-1+1)/(x-1)=x+4+4/(x-1)=(x-1)+4/(x-1)+5≥2√4+5=9。当 x-1=2⇒x=3,y=3/2。1/3+2/3=1✓。最小值为 9，选 A。' },
    { id:6, text:'某盒中有 4 个红球和 3 个白球，从中不放回地依次取出 2 个球。设 X 为取出的红球个数，则 E(X) =（  ）', opts:['A. 6/7','B. 8/7','C. 4/3','D. 2'], answer:'B', explain:'总球数 7（4红3白），取 2 个。X=0,1,2。P(X=0)=C(3,2)/C(7,2)=3/21=1/7；P(X=2)=C(4,2)/C(7,2)=6/21=2/7；P(X=1)=C(4,1)C(3,1)/C(7,2)=12/21=4/7。E(X)=0×1/7+1×4/7+2×2/7=8/7，选 B。' }
  ];

  // ===== Render Questions =====
  function renderQuestions() {
    var html = '';
    questionBank.forEach(function(q) {
      var score = questionScores[q.id];
      var reasons = errorReasons[q.id] || [];
      var note = questionNotes[q.id] || {};

      html += '<div class="question-card" id="qCard-' + q.id + '">';
      html += '<div class="question-header"><span class="question-num">' + q.id + '.</span><span class="question-text">' + q.text + '</span></div>';
      html += '<div class="options-list">';
      q.opts.forEach(function(opt) {
        html += '<div class="option-item"><span class="option-label">' + opt.charAt(0) + '</span>' + opt.substring(3) + '</div>';
      });
      html += '</div>';
      html += '<div class="question-footer">';
      html += '<div class="question-footer-top">';
      html += '<span class="answer-link" data-qid="' + q.id + '">查看答案与解析</span>';
      html += '</div>';
      html += '<div class="score-group">';
      html += '<button class="score-btn' + (score === 'right' ? ' selected-right' : '') + '" data-qid="' + q.id + '" data-score="right">✓ 对</button>';
      html += '<button class="score-btn' + (score === 'half' ? ' selected-half' : '') + '" data-qid="' + q.id + '" data-score="half">◐ 半对</button>';
      html += '<button class="score-btn' + (score === 'wrong' ? ' selected-wrong' : '') + '" data-qid="' + q.id + '" data-score="wrong">✗ 错</button>';
      html += '</div>';
      html += '</div>';

      // Expand section for half/wrong
      if (score === 'half' || score === 'wrong') {
        html += '<div class="expand-section">';
        html += '<div class="expand-label">错误原因（可多选）</div>';
        html += '<div class="reason-chips">';
        var reasonLabels = ['概念理解', '计算能力', '综合应用', '逻辑推理'];
        reasonLabels.forEach(function(r) {
          html += '<span class="reason-chip' + (reasons.indexOf(r) >= 0 ? ' selected' : '') + '" data-qid="' + q.id + '" data-reason="' + r + '">' + r + '</span>';
        });
        html += '</div>';
        html += '<div class="expand-label">备注（非必填）</div>';
        html += '<div class="notes-row">';
        html += '<button class="notes-photo-btn" data-qid="' + q.id + '" title="拍照" style="' + (note.photoUrl ? 'background-image:url(' + note.photoUrl + ');background-size:cover;background-position:center;' : '') + '">' + (note.photoUrl ? '' : '📷') + '</button>';
        html += '<textarea class="notes-input" data-qid="' + q.id + '" placeholder="输入备注内容...">' + (note.text || '') + '</textarea>';
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
    });

    // Append upload bar HTML
    var upGridHtml = '';
    uploadFiles.forEach(function(src, idx) {
      upGridHtml += '<div style="position:relative;flex-shrink:0">' +
        '<img class="fd-upload-thumb" src="' + src + '" alt="上传图片">' +
        '<button class="up-del-btn" data-idx="' + idx + '" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;border:none;background:var(--accent2);color:#fff;font-size:10px;cursor:pointer;line-height:18px;text-align:center;">✕</button>' +
        '</div>';
    });
    html += '<div class="fd-upload-bar">';
    html += '<div class="fd-upload-label">📎 上传试卷作答情况（非必填）</div>';
    html += '<div class="fd-upload-area">';
    html += '<div class="fd-upload-grid" id="fdUploadGrid">' + upGridHtml + '</div>';
    html += '<label class="fd-upload-add">';
    html += '<input type="file" accept="image/*" multiple hidden id="fdUploadInput">';
    html += '<span>+</span>';
    html += '<span style="font-size:10px;">添加图片</span>';
    html += '</label>';
    html += '</div>';
    html += '</div>';

    document.getElementById('fdContent').innerHTML = html;

    // Bind upload
    var upInput = document.getElementById('fdUploadInput');
    if (upInput) {
      upInput.addEventListener('change', function() {
        var files = this.files;
        for (var i = 0; i < files.length; i++) {
          (function(file) {
            var reader = new FileReader();
            reader.onload = function(e) {
              uploadFiles.push(e.target.result);
              renderQuestions();
            };
            reader.readAsDataURL(file);
          })(files[i]);
        }
        this.value = '';
      });
    }

    // Bind delete buttons on upload thumbs
    document.querySelectorAll('.up-del-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = parseInt(this.getAttribute('data-idx'));
        uploadFiles.splice(idx, 1);
        renderQuestions();
      });
    });

    // Bind answer links
    document.querySelectorAll('.answer-link').forEach(function(el) {
      el.addEventListener('click', function() {
        var qid = parseInt(this.getAttribute('data-qid'));
        openAnswerModal(qid);
      });
    });

    // Bind score buttons
    document.querySelectorAll('.score-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var qid = parseInt(this.getAttribute('data-qid'));
        var score = this.getAttribute('data-score');
        questionScores[qid] = score;
        if (score === 'right') { delete errorReasons[qid]; delete questionNotes[qid]; }
        renderQuestions();
      });
    });

    // Bind reason chips — toggle class directly, no full re-render
    document.querySelectorAll('.reason-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        var qid = parseInt(this.getAttribute('data-qid'));
        var reason = this.getAttribute('data-reason');
        if (!errorReasons[qid]) errorReasons[qid] = [];
        var idx = errorReasons[qid].indexOf(reason);
        if (idx >= 0) {
          errorReasons[qid].splice(idx, 1);
          this.classList.remove('selected');
        } else {
          errorReasons[qid].push(reason);
          this.classList.add('selected');
        }
      });
    });

    // Bind notes photo — partial re-render for the specific card only
    document.querySelectorAll('.notes-photo-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var qid = parseInt(this.getAttribute('data-qid'));
        var self = this;
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.addEventListener('change', function() {
          if (input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
              if (!questionNotes[qid]) questionNotes[qid] = {};
              questionNotes[qid].photoUrl = e.target.result;
              var ta = document.querySelector('.notes-input[data-qid="' + qid + '"]');
              if (ta && !questionNotes[qid].text) {
                questionNotes[qid].text = ta.value;
              }
              // Show thumbnail on the photo button without full re-render
              self.style.backgroundImage = 'url(' + e.target.result + ')';
              self.style.backgroundSize = 'cover';
              self.style.backgroundPosition = 'center';
              self.innerHTML = '';
            };
            reader.readAsDataURL(input.files[0]);
          }
        });
        input.click();
      });
    });

    // Bind notes textarea — save on input, no re-render
    document.querySelectorAll('.notes-input').forEach(function(ta) {
      ta.addEventListener('input', function() {
        var qid = parseInt(this.getAttribute('data-qid'));
        if (!questionNotes[qid]) questionNotes[qid] = {};
        questionNotes[qid].text = this.value;
      });
    });
  }

  // ===== Answer Modal =====
  function openAnswerModal(qid) {
    var q = questionBank.find(function(x) { return x.id === qid; });
    if (!q) return;
    var body = document.getElementById('answerModalBody');
    body.innerHTML = '<div class="answer-correct">✅ 正确答案：' + q.answer + '</div>' +
      '<div class="answer-explain">' + q.explain + '</div>';
    document.getElementById('answerModalOverlay').classList.add('open');
  }

  document.getElementById('answerModalClose').addEventListener('click', function() {
    document.getElementById('answerModalOverlay').classList.remove('open');
  });
  document.getElementById('answerModalOverlay').addEventListener('click', function(e) {
    if (e.target === this) document.getElementById('answerModalOverlay').classList.remove('open');
  });

  // ===== Back button =====
  document.getElementById('fdBackBtn').addEventListener('click', function() {
    var backTab = urlParams.get('tab');
    window.location.href = 'index.html' + (backTab ? '?tab=' + backTab : '');
  });

  // ===== Save button =====
  document.getElementById('fdSaveBtn').addEventListener('click', function() {
    var btn = this;
    btn.classList.add('saved');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>已保存';
    showToast('保存成功');
    setTimeout(function() {
      btn.classList.remove('saved');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>保存';
    }, 2000);
  });

  // ===== Toast =====
  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }

  // ===== Initialize =====
  renderQuestions();

})();
</script>

</body>
</html>
