<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错题本 - 考研超级课表</title>
<style>
:root {
  --bg: #f0f2f8;
  --bg2: #ffffff;
  --ink: #1a1a2e;
  --muted: #909399;
  --rule: #e8eaef;
  --accent: #5b6cf0;
  --accent-light: #eef0ff;
  --accent2: #f26b6b;
  --accent2-light: #fff0f0;
  --green: #52c41a;
  --green-light: #f0faf0;
  --orange: #fa9550;
  --orange-light: #fff7f0;
  --purple: #a855f7;
  --purple-light: #f5f0ff;
  --teal: #14b8a6;
  --teal-light: #f0faf9;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg, #dce3f0 0%, #e8dce8 30%, #dce8e4 60%, #e0e4f0 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  color: var(--ink);
  font-size: 14px;
}

/* iPad Frame */
.ipad-frame {
  width: 1280px;
  height: 834px;
  background: var(--bg);
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 25px 70px rgba(0,0,0,0.20),
    0 0 0 6px #2a2a2a,
    0 0 0 9px #3a3a3a,
    0 0 0 10px #444;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== Top Bar ===== */
.top-bar {
  height: 56px;
  background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 50%, #ffffff 100%);
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
  z-index: 10;
  gap: 12px;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1.5px solid var(--rule);
  background: var(--bg2);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  transition: all 0.25s ease;
  text-decoration: none;
  white-space: nowrap;
}

.back-btn:hover {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}

.back-btn svg {
  width: 16px;
  height: 16px;
}

.page-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.page-title-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #fff0f0, #ffe0e0);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* ===== Tab Bar ===== */
.tab-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  background: var(--bg2);
  padding: 8px 20px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}

.tab-item {
  flex: 1;
  max-width: 360px;
  padding: 12px 0;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  border: none;
  background: transparent;
  white-space: nowrap;
  user-select: none;
  text-align: center;
  position: relative;
}

.tab-item:hover {
  color: var(--ink);
  background: #f0f2f8;
}

.tab-item.active {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 2px 10px rgba(91,108,240,0.30);
}

.tab-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  border-radius: 10px;
  background: rgba(255,255,255,0.25);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  margin-left: 6px;
  padding: 0 6px;
}

.tab-item:not(.active) .tab-badge {
  background: #f0f2f8;
  color: var(--muted);
}

/* ===== Main Content ===== */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--muted);
  gap: 12px;
}

.empty-state-icon {
  font-size: 56px;
  opacity: 0.6;
}

.empty-state-text {
  font-size: 15px;
  font-weight: 500;
}

.empty-state-sub {
  font-size: 13px;
  opacity: 0.7;
}

/* Summary Bar */
.summary-bar {
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}

.summary-card {
  flex: 1;
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 12px;
}

.summary-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.summary-icon.total {
  background: linear-gradient(135deg, #fff0f0, #ffe0e0);
  color: var(--accent2);
}

.summary-icon.half {
  background: linear-gradient(135deg, #fff7f0, #ffe8d0);
  color: var(--orange);
}

.summary-icon.wrong {
  background: linear-gradient(135deg, #f0f0ff, #e0e0ff);
  color: var(--purple);
}

.summary-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.summary-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

.summary-num {
  font-size: 22px;
  font-weight: 800;
  color: var(--ink);
}

/* Question Card */
.question-card {
  background: var(--bg2);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--rule);
  transition: all 0.25s ease;
}

.question-card:hover {
  box-shadow: var(--shadow);
  border-color: #d0d4e8;
}

.question-body {
  padding: 20px 22px;
}

.question-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}

.question-index {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-light);
  padding: 4px 12px;
  border-radius: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}

.question-text {
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
  flex: 1;
  margin-bottom: 14px;
}

/* Options List */
.options-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.option-item {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--ink);
  background: #f6f7fb;
  border: 1px solid var(--rule);
  line-height: 1.6;
}

.option-item.correct-answer {
  background: #e8f5e9;
  border-color: #a5d6a7;
  color: #2e7d32;
}

/* Status Badge */
.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}

.status-badge.half {
  background: var(--orange-light);
  color: var(--orange);
}

.status-badge.wrong {
  background: var(--accent2-light);
  color: var(--accent2);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.half .status-dot {
  background: var(--orange);
}

.wrong .status-dot {
  background: var(--accent2);
}

.question-time {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Error Reason Tags */
.reason-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.reason-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  flex-shrink: 0;
}

.reason-tag {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid;
}

.reason-tag.concept {
  background: #eef0ff;
  color: var(--accent);
  border-color: #d8dcff;
}

.reason-tag.calculation {
  background: #fff3e0;
  color: #e67e22;
  border-color: #ffe0b2;
}

.reason-tag.application {
  background: #e8f5e9;
  color: #388e3c;
  border-color: #c8e6c9;
}

.reason-tag.logic {
  background: #f3e5f5;
  color: #8e24aa;
  border-color: #e1bee7;
}

.reason-tag.memory {
  background: #e0f7fa;
  color: #00838f;
  border-color: #b2ebf2;
}

/* Card Actions */
.card-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px;
  border-top: 1px solid var(--rule);
  background: #fafbfd;
}

.btn-delete {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--rule);
  background: var(--bg2);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s ease;
}

.btn-delete:hover {
  background: var(--accent2-light);
  border-color: var(--accent2);
  color: var(--accent2);
}

.btn-answer {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s ease;
  margin-left: auto;
}

.btn-answer:hover {
  background: #4a5be0;
  box-shadow: 0 3px 10px rgba(91,108,240,0.3);
}

/* Answer Panel (expandable) */
.answer-panel {
  display: none;
  padding: 14px 18px;
  border-top: 1px solid var(--rule);
  background: #fafbfd;
}

.answer-panel.show {
  display: block;
}

.answer-panel-inner {
  background: #f8f9fc;
  border-radius: var(--radius-sm);
  padding: 14px;
  border: 1px solid var(--rule);
}

.answer-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.answer-content {
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink);
}

/* Scrollbar */
.main-content::-webkit-scrollbar {
  width: 5px;
}
.main-content::-webkit-scrollbar-track {
  background: transparent;
}
.main-content::-webkit-scrollbar-thumb {
  background: #d0d4e0;
  border-radius: 3px;
}
</style>
</head>

        explain: '资本积累就是把剩余价值转化为资本。其实质是资本家不断利用无偿占有的剩余价值来扩大再生产，以继续无偿占有更多的剩余价值，体现了资本对雇佣劳动的剥削关系。'
      },
      {
        id: 'p3',
        text: '我国社会主义初级阶段的基本经济制度是（  ）',
        options: ['A. 公有制为主体、多种所有制经济共同发展', 'B. 按劳分配为主体、多种分配方式并存', 'C. 社会主义市场经济体制', 'D. 国有经济为主导的经济体制'],
        status: 'half',
        time: '2026-07-04 15:45',
        reasons: ['概念理解'],
        answer: 'A',
        explain: '公有制为主体、多种所有制经济共同发展是我国社会主义初级阶段的基本经济制度，这是由我国的社会主义性质和初级阶段的国情决定的。'
      },
      {
        id: 'p4',
        text: '新时代我国社会主要矛盾是（  ）',
        options: ['A. 人民日益增长的物质文化需要同落后的社会生产之间的矛盾', 'B. 人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾', 'C. 人民日益增长的民主法治需要同社会治理不完善之间的矛盾', 'D. 人民日益增长的生态文明需要同环境污染严重之间的矛盾'],
        status: 'wrong',
        time: '2026-07-03 20:00',
        reasons: ['综合应用', '逻辑推理'],
        answer: 'B',
        explain: '党的十九大报告指出，中国特色社会主义进入新时代，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。'
      }
    ]
  }
};

var currentTab = 'math';
var wrongBookState = {}; // Keep a mutable copy so deletions work

function initWrongBookState() {
  for (var subject in wrongBookData) {
    wrongBookState[subject] = JSON.parse(JSON.stringify(wrongBookData[subject]));
  }
}

// ===== Render =====
function renderWrongBook() {
  var data = wrongBookState[currentTab];
  var mainContent = document.getElementById('mainContent');

  if (!data || data.questions.length === 0) {
    mainContent.innerHTML = '' +
      '<div class="empty-state">' +
        '<div class="empty-state-icon">🎉</div>' +
        '<div class="empty-state-text">暂无错题记录</div>' +
        '<div class="empty-state-sub">继续加油，保持零错题！</div>' +
      '</div>';
    updateBadges();
    return;
  }

  // Summary Bar
  var summaryHtml = '' +
    '<div class="summary-bar">' +
      '<div class="summary-card">' +
        '<div class="summary-icon total">📋</div>' +
        '<div class="summary-info">' +
          '<span class="summary-label">总错题</span>' +
          '<span class="summary-num">' + data.total + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="summary-card">' +
        '<div class="summary-icon half">🟡</div>' +
        '<div class="summary-info">' +
          '<span class="summary-label">半对</span>' +
          '<span class="summary-num">' + data.half + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="summary-card">' +
        '<div class="summary-icon wrong">✕</div>' +
        '<div class="summary-info">' +
          '<span class="summary-label">错误</span>' +
          '<span class="summary-num">' + data.wrong + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Question Cards
  var cardsHtml = '';
  data.questions.forEach(function(q, index) {
    var reasonsHtml = q.reasons.map(function(r) {
      var cls = '';
      if (r === '概念理解') cls = 'concept';
      else if (r === '计算能力') cls = 'calculation';
      else if (r === '综合应用') cls = 'application';
      else if (r === '逻辑推理') cls = 'logic';
      return '<span class="reason-tag ' + cls + '">' + r + '</span>';
    }).join('');

    var optionsHtml = '';
    if (q.options && q.options.length > 0) {
      optionsHtml = '<div class="options-list">' + q.options.map(function(opt) {
        var isCorrect = opt.charAt(0) === q.answer;
        return '<span class="option-item' + (isCorrect ? ' correct-answer' : '') + '">' + opt + '</span>';
      }).join('') + '</div>';
    }

    cardsHtml += '' +
      '<div class="question-card" data-id="' + q.id + '">' +
        '<div class="question-body">' +
          '<div class="question-text">' + q.text + '</div>' +
          optionsHtml +
          '<div class="status-row">' +
            '<span class="status-badge ' + q.status + '">' +
              '<span class="status-dot"></span>' +
              (q.status === 'half' ? '半对' : '错误') +
            '</span>' +
            '<span class="question-time">' +
              '📅 ' + q.time +
            '</span>' +
          '</div>' +
          '<div class="reason-row">' +
            '<span class="reason-label">错误原因：</span>' +
            reasonsHtml +
          '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="btn-delete" data-id="' + q.id + '" data-subject="' + currentTab + '">' +
            '🗑 删除' +
          '</button>' +
          '<button class="btn-answer" data-id="' + q.id + '">' +
            '💡 查看答案与解析' +
          '</button>' +
        '</div>' +
        '<div class="answer-panel" id="answer-' + q.id + '">' +
          '<div class="answer-panel-inner">' +
            '<div class="answer-label">✅ 正确答案：' + q.answer + '</div>' +
            '<div class="answer-content">' + q.explain + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  });

  mainContent.innerHTML = summaryHtml + cardsHtml;

  bindEvents();
  updateBadges();
}

function bindEvents() {
  // Delete buttons
  document.querySelectorAll('.btn-delete').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = this.getAttribute('data-id');
      var subject = this.getAttribute('data-subject');
      deleteQuestion(subject, id);
    });
  });

  // Answer toggle buttons
  document.querySelectorAll('.btn-answer').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = this.getAttribute('data-id');
      var panel = document.getElementById('answer-' + id);
      if (panel) {
        var isShowing = panel.classList.contains('show');
        panel.classList.toggle('show');
        this.innerHTML = isShowing ? '💡 查看答案与解析' : '🔽 收起答案与解析';
      }
    });
  });
}

function deleteQuestion(subject, id) {
  var data = wrongBookState[subject];
  if (!data) return;

  var idx = -1;
  for (var i = 0; i < data.questions.length; i++) {
    if (data.questions[i].id === id) {
      idx = i;
      break;
    }
  }
  if (idx === -1) return;

  var removed = data.questions.splice(idx, 1)[0];
  data.total = Math.max(0, data.total - 1);
  if (removed.status === 'half') data.half = Math.max(0, data.half - 1);
  else if (removed.status === 'wrong') data.wrong = Math.max(0, data.wrong - 1);

  renderWrongBook();
}

function updateBadges() {
  for (var subject in wrongBookState) {
    var badge = document.getElementById(subject + 'Badge');
    if (badge) {
      badge.textContent = wrongBookState[subject].total;
    }
  }
}

// ===== Tab Switching =====
document.getElementById('tabBar').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab-item');
  if (!tab) return;

  var allTabs = this.querySelectorAll('.tab-item');
  allTabs.forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');

  currentTab = tab.getAttribute('data-tab');

  // Update back button href to return to correct tab
  var backBtn = document.querySelector('.back-btn');
  if (backBtn) {
    backBtn.href = 'index.html?tab=' + currentTab;
  }

  renderWrongBook();
});

// ===== Initialize =====
initWrongBookState();

// Read URL param for pre-selected tab
var urlParams = new URLSearchParams(window.location.search);
var initSubject = urlParams.get('subject');
if (initSubject && wrongBookState[initSubject]) {
  currentTab = initSubject;
  // Update active tab button
  var allTabBtns = document.querySelectorAll('#tabBar .tab-item');
  allTabBtns.forEach(function(t) {
    t.classList.remove('active');
    if (t.getAttribute('data-tab') === currentTab) {
      t.classList.add('active');
    }
  });
  // Update back button to return to correct tab
  var backBtn = document.querySelector('.back-btn');
  if (backBtn) {
    backBtn.href = 'index.html?tab=' + currentTab;
  }
}

renderWrongBook();
</script>
