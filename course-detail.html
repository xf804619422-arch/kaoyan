<script>
(function() {
  // ===== URL Params =====
  var params = new URLSearchParams(window.location.search);
  var courseName = params.get('name') || 'A班7月6日直播课';
  var courseRef = params.get('ref') || 'schedule';

  // ===== DOM Refs =====
  var cdTitle = document.getElementById('cdTitle');
  var cdSubtitle = document.getElementById('cdSubtitle');

  // ===== Set Course Info =====
  cdTitle.textContent = courseName;
  var now = new Date();
  var pad = function(n) { return n < 10 ? '0' + n : n; };
  cdSubtitle.textContent = '分发时间：' + now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());

  // ===== Chapter Data =====
  var chapters = [
    { id: 1, name: '复合函数求导法则（链式法则）', duration: '14:20', status: 'watching' },
    { id: 2, name: '多元复合函数的偏导数', duration: '12:08', status: 'unwatched' },
    { id: 3, name: '隐函数求导方法', duration: '08:45', status: 'unwatched' },
    { id: 4, name: '参数方程求导与相关变化率', duration: '11:37', status: 'unwatched' }
  ];

  var activeChapter = 1;

  // ===== Render Chapter List =====
  function renderChapters() {
    var container = document.getElementById('chapterList');
    var html = '';
    var watchedCount = 0;

    chapters.forEach(function(ch) {
      if (ch.status === 'watched') watchedCount++;
      var badgeClass = ch.status === 'watched' ? 'watched' : ch.status === 'watching' ? 'watching' : 'unwatched';
      var badgeText = ch.status === 'watched' ? '已学' : ch.status === 'watching' ? '学习中' : '未学';
      var activeClass = ch.id === activeChapter ? ' active' : '';

      html += '<div class="cd-chapter-item' + activeClass + '" data-chapter="' + ch.id + '">';
      html += '<span class="cd-chapter-num">' + ch.id + '</span>';
      html += '<div class="cd-chapter-info">';
      html += '<span class="cd-chapter-name">' + ch.name + '</span>';
      html += '<span class="cd-chapter-duration">⏱ ' + ch.duration + '</span>';
      html += '</div>';
      html += '<span class="cd-chapter-badge ' + badgeClass + '">' + badgeText + '</span>';
      html += '</div>';
    });

    container.innerHTML = html;

    // Update sidebar header
    document.getElementById('chapterSidebarSub').textContent = '共 ' + chapters.length + ' 课时 · 已学 ' + watchedCount + ' 课时';

    // Bind clicks
    container.querySelectorAll('.cd-chapter-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var chId = parseInt(this.getAttribute('data-chapter'));
        if (chId !== activeChapter) {
          activeChapter = chId;
          // Mark as watching
          chapters.forEach(function(c) {
            if (c.id === chId && c.status === 'unwatched') c.status = 'watching';
          });
          renderChapters();
          showToast('切换到：' + chapters[chId - 1].name);

          // Update video info
          document.getElementById('metaChapter').textContent = '导数与微分 · ' + chapters[chId - 1].name;
          document.getElementById('metaDuration').textContent = chapters[chId - 1].duration;
          document.getElementById('vcCurrent').textContent = '00:00';
          document.getElementById('vcProgressFill').style.width = '0%';
        }
      });
    });
  }

  // ===== Back Button =====
  document.getElementById('cdBackBtn').addEventListener('click', function() {
    // Try history.back(), fallback to index.html with proper ref
    if (document.referrer && document.referrer.indexOf('index.html') >= 0) {
      window.history.back();
    } else {
      if (courseRef === 'math') {
        window.location.href = 'index.html?tab=math';
      } else {
        window.location.href = 'index.html';
      }
    }
  });

  // ===== Video Play Button =====
  var isPlaying = false;
  var playBtn = document.getElementById('videoPlayBtn');
  var vcPlayBtn = document.getElementById('vcPlayBtn');

  function togglePlay() {
    isPlaying = !isPlaying;
    if (isPlaying) {
      playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
      vcPlayBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
      playBtn.style.opacity = '0.5';
      // Simulate progress
      startProgressSimulation();
    } else {
      playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      vcPlayBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      playBtn.style.opacity = '1';
      stopProgressSimulation();
    }
  }

  playBtn.addEventListener('click', togglePlay);
  vcPlayBtn.addEventListener('click', togglePlay);

  // Clicking video card area also toggles
  document.getElementById('videoCard').addEventListener('click', function(e) {
    if (e.target.closest('.video-controls') || e.target.closest('#videoPlayBtn')) return;
    togglePlay();
  });

  // ===== Progress Simulation =====
  var progressTimer = null;
  function startProgressSimulation() {
    var progressEl = document.getElementById('vcProgressFill');
    var currentTimeEl = document.getElementById('vcCurrent');
    var currentProgress = parseFloat(progressEl.style.width) || 0;

    progressTimer = setInterval(function() {
      currentProgress += 0.15;
      if (currentProgress >= 100) {
        currentProgress = 100;
        stopProgressSimulation();
        isPlaying = false;
        playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        vcPlayBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        playBtn.style.opacity = '1';
        showToast('播放完毕');
      }
      progressEl.style.width = currentProgress + '%';

      // Update time display
      var totalSec = 2330; // 38:50 in seconds
      var elapsed = Math.floor(totalSec * currentProgress / 100);
      var m = Math.floor(elapsed / 60);
      var s = elapsed % 60;
      currentTimeEl.textContent = m + ':' + (s < 10 ? '0' + s : s);
    }, 300);
  }

  function stopProgressSimulation() {
    if (progressTimer) {
      clearInterval(progressTimer);
      progressTimer = null;
    }
  }

  // ===== Progress Bar Click =====
  document.getElementById('vcProgressWrap').addEventListener('click', function(e) {
    e.stopPropagation();
    var rect = this.getBoundingClientRect();
    var pct = ((e.clientX - rect.left) / rect.width) * 100;
    pct = Math.max(0, Math.min(100, pct));
    var progressEl = document.getElementById('vcProgressFill');
    progressEl.style.width = pct + '%';

    var totalSec = 2330;
    var elapsed = Math.floor(totalSec * pct / 100);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    document.getElementById('vcCurrent').textContent = m + ':' + (s < 10 ? '0' + s : s);
  });

  // ===== Toast =====
  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }

  // ===== Initialize =====
  renderChapters();

})();
</script>

</body>
</html>
