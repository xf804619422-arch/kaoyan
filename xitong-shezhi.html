<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研学习平台 / 系统设置</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;overflow:hidden}
  .app{display:flex;height:100vh}

  /* ---- 左侧边栏 ---- */
  .sidebar{width:240px;min-width:240px;background:#1e293b;display:flex;flex-direction:column;z-index:10}
  .sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid #334155}
  .sidebar-logo .logo-icon{width:28px;height:28px;background:#475569;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;margin-right:10px;flex-shrink:0}
  .sidebar-logo .logo-text{color:#e2e8f0;font-size:14px;font-weight:600;white-space:nowrap}
  .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
  .sidebar-nav .nav-item{display:flex;align-items:center;padding:10px 20px;color:#94a3b8;font-size:14px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;margin:2px 0}
  .sidebar-nav .nav-item:hover{color:#e2e8f0;background:rgba(71,85,105,.3)}
  .sidebar-nav .nav-item.active{color:#fff;background:rgba(71,85,105,.5);border-left-color:#64748b;font-weight:600}
  .sidebar-nav .nav-item svg{width:18px;height:18px;margin-right:10px;flex-shrink:0}

  /* ---- 右侧主区域 ---- */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .header{height:56px;min-height:56px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid #e2e8f0;z-index:5}
  .header-breadcrumb{font-size:14px;color:#475569}
  .header-breadcrumb span{color:#94a3b8}
  .header-right{display:flex;align-items:center;gap:20px}
  .header-btn{width:34px;height:34px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s}
  .header-btn:hover{border-color:#cbd5e1;background:#f8fafc}
  .header-btn .badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#ef4444;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .header-user{display:flex;align-items:center;gap:8px;cursor:pointer;position:relative;padding:4px 8px;border-radius:8px;transition:background .2s}
  .header-user:hover{background:#f1f5f9}
  .header-user .avatar{width:32px;height:32px;border-radius:50%;background:#475569;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .header-user .uname{font-size:13px;color:#334155;font-weight:500}
  .header-user .arrow{font-size:10px;color:#94a3b8;margin-left:2px}
  .user-dropdown{position:absolute;top:46px;right:0;width:160px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden;display:none;z-index:50}
  .user-dropdown.show{display:block}
  .user-dropdown .dd-item{padding:10px 16px;font-size:13px;color:#334155;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
  .user-dropdown .dd-item:hover{background:#f1f5f9}
  .user-dropdown .dd-item.danger{color:#ef4444}

  /* ---- 内容区域 ---- */
  .content{flex:1;padding:20px;overflow-y:auto;background:#f1f5f9}
  .panel{display:none;animation:fadeIn .25s ease}
  .panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  /* ---- 通用组件 ---- */
  .card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:16px}
  .card-header{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
  .card-header .card-title{font-size:14px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:8px}
  .card-header .card-title::before{content:"";width:4px;height:16px;background:#475569;border-radius:2px}
  .card-body{padding:20px}

  .btn{padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit;line-height:1.4}
  .btn-primary{background:#475569;color:#fff;border-color:#475569}
  .btn-primary:hover{background:#334155;border-color:#334155}
  .btn-outline{background:#fff;color:#475569;border-color:#cbd5e1}
  .btn-outline:hover{background:#f8fafc;border-color:#94a3b8}
  .btn-sm{padding:4px 10px;font-size:12px}
  .btn-xs{padding:2px 8px;font-size:11px;border-radius:4px}
  .btn-danger-text{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:2px 6px}
  .btn-danger-text:hover{color:#dc2626;text-decoration:underline}
  .btn-text{background:none;border:none;color:#475569;cursor:pointer;font-size:12px;padding:2px 6px}
  .btn-text:hover{color:#1e293b;text-decoration:underline}

  /* ---- 权限矩阵表格 ---- */
  .perm-table-wrap{overflow-x:auto;max-height:calc(100vh - 260px);overflow-y:auto}
  .perm-table{border-collapse:collapse;width:100%;min-width:1100px;font-size:13px}
  .perm-table th,.perm-table td{border:1px solid #e2e8f0;padding:8px 10px;text-align:center;white-space:nowrap}
  .perm-table thead th{background:#f8fafc;color:#475569;font-weight:600;position:sticky;top:0;z-index:2}
  .perm-table thead th.group-header{background:#e2e8f0;color:#334155;font-size:13px;font-weight:700;letter-spacing:.5px}
  .perm-table tbody td.role-col{background:#f8fafc;font-weight:600;color:#334155;text-align:left;padding-left:14px;min-width:110px;position:sticky;left:0;z-index:1}
  .perm-table tbody td.role-col.super-admin{color:#475569}
  .perm-table tbody tr:hover td{background:#f8fafc}
  .perm-table tbody tr:hover td.role-col{background:#e2e8f0}
  .perm-table .perm-check{width:16px;height:16px;cursor:pointer;accent-color:#475569}
  .perm-table .perm-check:disabled{cursor:not-allowed;opacity:.5}
  .perm-table .perm-check:disabled+label{cursor:not-allowed;opacity:.5}
  .perm-footer{padding:16px 20px;border-top:1px solid #e2e8f0;display:flex;gap:12px;justify-content:flex-end;background:#fff}
  .sub-group-label{font-size:11px;color:#94a3b8;margin-top:2px}

  /* ---- 数据字典 ---- */
  .dict-container{display:flex;gap:0;height:calc(100vh - 200px)}
  .dict-left{width:220px;min-width:220px;border-right:1px solid #e2e8f0;overflow-y:auto;background:#fff}
  .dict-left .dict-search{padding:12px}
  .dict-left .dict-search input{width:100%;padding:7px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155}
  .dict-left .dict-search input:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .dict-left .dict-cat{padding:10px 16px;font-size:13px;color:#475569;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
  .dict-left .dict-cat:hover{background:#f1f5f9}
  .dict-left .dict-cat.active{background:#f1f5f9;border-left-color:#475569;color:#1e293b;font-weight:600}
  .dict-left .dict-cat .count{font-size:11px;color:#94a3b8;background:#f1f5f9;padding:1px 7px;border-radius:10px}
  .dict-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .dict-right-header{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#fafbfc}
  .dict-right-header .dict-name{font-size:14px;font-weight:600;color:#1e293b}
  .dict-right-body{flex:1;overflow-y:auto;padding:0}
  .dict-table{width:100%;border-collapse:collapse;font-size:13px}
  .dict-table th,.dict-table td{padding:10px 14px;text-align:left;border-bottom:1px solid #f1f5f9}
  .dict-table th{background:#f8fafc;color:#64748b;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0}
  .dict-table tbody tr:hover td{background:#f8fafc}
  .dict-table .status-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500}
  .dict-table .status-tag.enabled{background:#ecfdf5;color:#059669}
  .dict-table .status-tag.disabled{background:#fef2f2;color:#dc2626}
  .dict-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:13px}

  /* ---- 操作日志 ---- */
  .log-filter{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:16px}
  .log-filter .filter-group{display:flex;flex-direction:column;gap:4px}
  .log-filter .filter-group label{font-size:12px;color:#64748b;font-weight:500}
  .log-filter input,.log-filter select{padding:7px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155;background:#fff;min-width:140px}
  .log-filter input:focus,.log-filter select:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .log-table-wrap{overflow-x:auto;max-height:calc(100vh - 310px);overflow-y:auto}
  .log-table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
  .log-table th,.log-table td{padding:10px 14px;text-align:left;border-bottom:1px solid #f1f5f9;white-space:nowrap}
  .log-table th{background:#f8fafc;color:#64748b;font-weight:600;font-size:12px;position:sticky;top:0;z-index:1}
  .log-table tbody tr:hover td{background:#f8fafc}
  .log-table .result-success{color:#059669;font-weight:500}
  .log-table .result-fail{color:#dc2626;font-weight:500}

  /* ---- 弹窗 ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:12px;width:480px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-header{padding:16px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
  .modal-header .modal-title{font-size:15px;font-weight:600;color:#1e293b}
  .modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;transition:all .15s}
  .modal-close:hover{background:#f1f5f9;color:#475569}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:12px 24px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end}
  .form-group{margin-bottom:16px}
  .form-group:last-child{margin-bottom:0}
  .form-group label{display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:5px}
  .form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155;background:#fff}
  .form-group input:focus,.form-group select:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .form-row{display:flex;gap:12px}
  .form-row .form-group{flex:1}

  /* ---- Toast ---- */
  .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:toastIn .3s ease;pointer-events:none}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ---- 滚动条 ---- */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#94a3b8}

  .text-muted{color:#94a3b8;font-size:12px}
  .mt-4{margin-top:16px}
  .flex-between{display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>
<div class="app">
  <!-- ===== 左侧边栏 ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">研</div>
      <div class="logo-text">考研学习平台</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-panel="permission">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        权限配置
      </div>
      <div class="nav-item" data-panel="dict">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        数据字典
      </div>
      <div class="nav-item" data-panel="log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg>
        操作日志
      </div>
    </nav>
  </aside>

  <!-- ===== 右侧主区域 ===== -->
  <div class="main">
    <!-- 顶部栏 -->
    <header class="header">
      <div class="header-breadcrumb">
        考研学习平台 <span>/ 系统设置</span>
      </div>
      <div class="header-right">
        <button class="header-btn" title="消息通知">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge">3</span>
        </button>
        <div class="header-user" onclick="toggleUserDropdown(event)">
          <div class="avatar">超</div>
          <span class="uname">超级管理员</span>
          <span class="arrow">&#9660;</span>
          <div class="user-dropdown" id="userDropdown">
            <div class="dd-item" onclick="event.stopPropagation();showToast('修改密码功能')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              修改密码
            </div>
            <div class="dd-item danger" onclick="event.stopPropagation();showToast('已退出登录')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              退出登录
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- 内容区域 -->
    <div class="content" id="contentArea">

      <!-- ==================== 权限配置 ==================== -->
      <div class="panel active" id="panel-permission">
        <div class="card">
          <div class="card-header">
            <div class="card-title">权限矩阵配置</div>
            <span class="text-muted">勾选复选框分配对应角色在该页面的访问权限</span>
          </div>
          <div class="perm-table-wrap">
            <table class="perm-table" id="permTable">
              <thead>
                <tr>
                  <th style="min-width:110px">角色</th>
                  <th class="group-header" colspan="4">教务管理组</th>
                  <th class="group-header" colspan="4">教研管理组</th>
                  <th class="group-header" colspan="4">班级教学组</th>
                  <th class="group-header" colspan="4">系统设置组</th>
                </tr>
                <tr>
                  <th>角色 \ 页面</th>
                  <th>学员管理</th><th>班级管理</th><th>课程安排</th><th>考试管理</th>
                  <th>题目录入</th><th>题目审核</th><th>试卷组卷</th><th>试卷审核</th>
                  <th>教学计划</th><th>作业布置</th><th>学习跟踪</th><th>成绩分析</th>
                  <th>权限配置</th><th>数据字典</th><th>操作日志</th><th>系统参数</th>
                </tr>
              </thead>
              <tbody>
                <tr data-role="super_admin">
                  <td class="role-col super-admin">超级管理员</td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                  <td><input type="checkbox" class="perm-check" checked disabled></td>
                </tr>
                <tr data-role="edu_admin">
                  <td class="role-col">教务管理员</td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                </tr>
                <tr data-role="researcher">
                  <td class="role-col">教研员</td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                </tr>
                <tr data-role="class_teacher">
                  <td class="role-col">班主任</td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check" checked></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                  <td><input type="checkbox" class="perm-check"></td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="perm-footer">
            <button class="btn btn-outline" onclick="resetPermissions()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              重置

function initSidebar(){
  var items = document.querySelectorAll('.sidebar-nav .nav-item');
  items.forEach(function(item){
    item.addEventListener('click',function(){
      var panel = this.getAttribute('data-panel');
      switchPanel(panel);
    });
  });
}
function switchPanel(panel){
  currentPanel = panel;
  // 更新侧边栏激活状态
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(function(el){el.classList.remove('active')});
  document.querySelector('.nav-item[data-panel="'+panel+'"]').classList.add('active');
  // 切换内容面板
  document.querySelectorAll('.panel').forEach(function(el){el.classList.remove('active')});
  document.getElementById('panel-'+panel).classList.add('active');
}

// ===== Toast =====
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){t.style.display = 'none';},2000);
}

// ==================== 权限配置 ====================
function saveInitialPermissions(){
  var checks = document.querySelectorAll('#permTable tbody .perm-check:not(:disabled)');
  checks.forEach(function(cb,i){
    initialPermissions[i] = cb.checked;
  });
}
function savePermissions(){
  var saved = 0;
  var checks = document.querySelectorAll('#permTable tbody .perm-check:not(:disabled)');
  checks.forEach(function(cb,i){
    if(cb.checked !== initialPermissions[i]) saved++;
    initialPermissions[i] = cb.checked;
  });
  showToast('权限配置已保存'+(saved>0?'，共更新 '+saved+' 项权限':'（无变更）'));
}
function resetPermissions(){
  var checks = document.querySelectorAll('#permTable tbody .perm-check:not(:disabled)');
  checks.forEach(function(cb,i){
    cb.checked = initialPermissions[i];
  });
  showToast('已重置为上次保存的配置');
}

// ==================== 数据字典 ====================
function initDictCategories(){
  var list = document.getElementById('dictCategoryList');
  var cats = Object.keys(dictData);
  cats.forEach(function(cat){
    var div = document.createElement('div');
    div.className = 'dict-cat';
    div.setAttribute('data-cat',cat);
    div.innerHTML = cat + ' <span class="count">' + dictData[cat].length + '</span>';
    div.addEventListener('click',function(){
      selectDictCategory(cat);
    });
    list.appendChild(div);
  });
}
function filterDictCategories(keyword){
  var items = document.querySelectorAll('#dictCategoryList .dict-cat');
  var kw = keyword.toLowerCase();
  items.forEach(function(item){
    var cat = item.getAttribute('data-cat');
    if(!kw || cat.toLowerCase().includes(kw)){
      item.style.display = 'flex';
    }else{
      item.style.display = 'none';
    }
  });
}
function selectDictCategory(cat){
  currentDictCategory = cat;
  // 更新左侧激活
  document.querySelectorAll('#dictCategoryList .dict-cat').forEach(function(el){el.classList.remove('active')});
  document.querySelector('#dictCategoryList .dict-cat[data-cat="'+cat+'"]').classList.add('active');
  // 更新右侧标题
  document.getElementById('dictCurrentName').textContent = cat;
  document.getElementById('btnAddDictItem').style.display = 'inline-flex';
  // 渲染表格
  renderDictTable(cat);
}
function renderDictTable(cat){
  var area = document.getElementById('dictTableArea');
  var items = dictData[cat] || [];
  if(items.length===0){
    area.innerHTML = '<div class="dict-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span style="margin-top:8px">暂无枚举项数据</span></div>';
    return;
  }
  var html = '<table class="dict-table"><thead><tr><th>枚举值</th><th>显示名称</th><th>排序号</th><th>状态</th><th style="width:120px">操作</th></tr></thead><tbody>';
  items.forEach(function(item,i){
    var statusClass = item.status==='enabled'?'enabled':'disabled';
    var statusText = item.status==='enabled'?'启用':'停用';
    html += '<tr>';
    html += '<td style="font-family:monospace;color:#475569;font-weight:500">'+item.code+'</td>';
    html += '<td>'+item.name+'</td>';
    html += '<td style="color:#94a3b8">'+item.sort+'</td>';
    html += '<td><span class="status-tag '+statusClass+'">'+statusText+'</span></td>';
    html += '<td>';
    html += '<button class="btn-text" onclick="editDictItem(\''+cat+'\','+i+')">编辑</button>';
    if(item.status==='enabled'){
      html += '<button class="btn-danger-text" onclick="toggleDictItem(\''+cat+'\','+i+')">停用</button>';
    }else{
      html += '<button class="btn-text" style="color:#059669" onclick="toggleDictItem(\''+cat+'\','+i+')">启用</button>';
    }
    html += '</td></tr>';
  });
  html += '</tbody></table>';
  area.innerHTML = html;
}
function openDictModal(cat,editIndex){
  if(!currentDictCategory){showToast('请先选择字典类别');return;}
  document.getElementById('dictModalEditIndex').value = (editIndex!==undefined)?editIndex:-1;
  if(editIndex!==undefined&&editIndex>=0){
    document.getElementById('dictModalTitle').textContent = '编辑枚举项';
    var item = dictData[currentDictCategory][editIndex];
    document.getElementById('dictModalCode').value = item.code;
    document.getElementById('dictModalName').value = item.name;
    document.getElementById('dictModalSort').value = item.sort;
    document.getElementById('dictModalStatus').value = item.status;
  }else{
    document.getElementById('dictModalTitle').textContent = '新增枚举项';
    document.getElementById('dictModalCode').value = '';
    document.getElementById('dictModalName').value = '';
    document.getElementById('dictModalSort').value = (dictData[currentDictCategory]||[]).length + 1;
    document.getElementById('dictModalStatus').value = 'enabled';
  }
  document.getElementById('dictModalOverlay').classList.add('show');
}
function editDictItem(cat,index){
  currentDictCategory = cat;
  selectDictCategory(cat);
  openDictModal(cat,index);
}
function closeDictModal(){
  document.getElementById('dictModalOverlay').classList.remove('show');
}
function saveDictItem(){
  var code = document.getElementById('dictModalCode').value.trim();
  var name = document.getElementById('dictModalName').value.trim();
  var sort = parseInt(document.getElementById('dictModalSort').value)||1;
  var status = document.getElementById('dictModalStatus').value;
  var editIndex = parseInt(document.getElementById('dictModalEditIndex').value);

  if(!code){showToast('请输入枚举值');return;}
  if(!name){showToast('请输入显示名称');return;}

  if(editIndex>=0){
    dictData[currentDictCategory][editIndex] = {code:code,name:name,sort:sort,status:status};
    showToast('枚举项已更新');
  }else{
    // 检查重复
    var exists = dictData[currentDictCategory].some(function(item){return item.code===code;});
    if(exists){showToast('枚举值已存在');return;}
    dictData[currentDictCategory].push({code:code,name:name,sort:sort,status:status});
    showToast('枚举项已新增');
  }
  closeDictModal();
  // 刷新
  selectDictCategory(currentDictCategory);
}
function toggleDictItem(cat,index){
  var item = dictData[cat][index];
  item.status = item.status==='enabled'?'disabled':'enabled';
  showToast('枚举项已'+(item.status==='enabled'?'启用':'停用'));
  renderDictTable(cat);
  // 更新计数
  updateDictCount(cat);
}
function updateDictCount(cat){
  var el = document.querySelector('#dictCategoryList .dict-cat[data-cat="'+cat+'"] .count');
  if(el) el.textContent = dictData[cat].length;
}

// ==================== 操作日志 ====================
function initLogTable(){
  renderLogTable(logData);
}
function renderLogTable(data){
  var tbody = document.getElementById('logTableBody');
  if(data.length===0){
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8">暂无匹配的操作日志</td></tr>';
    return;
  }
  var html = '';
  data.forEach(function(log){
    var resultClass = log.result==='success'?'result-success':'result-fail';
    var resultText = log.result==='success'?'成功':'失败';
    html += '<tr>';
    html += '<td style="color:#64748b">'+log.time+'</td>';
    html += '<td style="font-weight:500">'+log.user+'</td>';
    html += '<td style="color:#475569">'+log.role+'</td>';
    html += '<td style="font-family:monospace;font-size:12px;color:#94a3b8">'+log.ip+'</td>';
    html += '<td>'+log.module+'</td>';
    html += '<td>'+log.type+'</td>';
    html += '<td>'+log.target+'</td>';
    html += '<td class="'+resultClass+'">'+resultText+'</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}
function filterLogs(){
  var user = (document.getElementById('logFilterUser').value||'').trim().toLowerCase();
  var dateStart = document.getElementById('logFilterDateStart').value;
  var dateEnd = document.getElementById('logFilterDateEnd').value;
  var module = document.getElementById('logFilterModule').value;
  var type = document.getElementById('logFilterType').value;

  var filtered = logData.filter(function(log){
    if(user && !log.user.toLowerCase().includes(user)) return false;
    if(dateStart && log.time < dateStart) return false;
    if(dateEnd && log.time > dateEnd+' 23:59:59') return false;
    if(module && log.module !== module) return false;
    if(type && log.type !== type) return false;
    return true;
  });
  renderLogTable(filtered);
}
function resetLogFilters(){
  document.getElementById('logFilterUser').value = '';
  document.getElementById('logFilterDateStart').value = '';
  document.getElementById('logFilterDateEnd').value = '';
  document.getElementById('logFilterModule').value = '';
  document.getElementById('logFilterType').value = '';
  renderLogTable(logData);
}
function exportLogs(){
  var filtered = logData.filter(function(log){
    var user = (document.getElementById('logFilterUser').value||'').trim().toLowerCase();
    var dateStart = document.getElementById('logFilterDateStart').value;
    var dateEnd = document.getElementById('logFilterDateEnd').value;
    var module = document.getElementById('logFilterModule').value;
    var type = document.getElementById('logFilterType').value;
    if(user && !log.user.toLowerCase().includes(user)) return false;
    if(dateStart && log.time < dateStart) return false;
    if(dateEnd && log.time > dateEnd+' 23:59:59') return false;
    if(module && log.module !== module) return false;
    if(type && log.type !== type) return false;
    return true;
  });
  // 模拟导出CSV
  var csv = '\uFEFF操作时间,操作人,角色,IP地址,操作模块,操作类型,操作对象,操作结果\n';
  filtered.forEach(function(log){
    csv += [log.time,log.user,log.role,log.ip,log.module,log.type,log.target,log.result==='success'?'成功':'失败'].join(',')+'\n';
  });
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '操作日志_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 '+filtered.length+' 条日志记录');
}
</script>
