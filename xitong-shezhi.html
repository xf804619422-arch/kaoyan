<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研学习平台 / 系统设置</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;overflow:hidden}
  .app{display:flex;height:100vh}

  /* ---- 左侧边栏 ---- */
  .sidebar{width:240px;min-width:240px;background:#1e293b;display:flex;flex-direction:column;z-index:10}
  .sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid #334155}
  .sidebar-logo .logo-icon{width:28px;height:28px;background:#475569;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;margin-right:10px;flex-shrink:0}
  .sidebar-logo .logo-text{color:#e2e8f0;font-size:14px;font-weight:600;white-space:nowrap}
  .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
  .sidebar-nav .nav-item{display:flex;align-items:center;padding:10px 20px;color:#94a3b8;font-size:14px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;margin:2px 0}
  .sidebar-nav .nav-item:hover{color:#e2e8f0;background:rgba(71,85,105,.3)}
  .sidebar-nav .nav-item.active{color:#fff;background:rgba(71,85,105,.5);border-left-color:#64748b;font-weight:600}
  .sidebar-nav .nav-item svg{width:18px;height:18px;margin-right:10px;flex-shrink:0}

  /* ---- 右侧主区域 ---- */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .header{height:56px;min-height:56px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid #e2e8f0;z-index:5}
  .header-breadcrumb{font-size:14px;color:#475569}
  .header-breadcrumb span{color:#94a3b8}
  .header-right{display:flex;align-items:center;gap:20px}
  .header-btn{width:34px;height:34px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s}
  .header-btn:hover{border-color:#cbd5e1;background:#f8fafc}
  .header-btn .badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#ef4444;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .header-user{display:flex;align-items:center;gap:8px;cursor:pointer;position:relative;padding:4px 8px;border-radius:8px;transition:background .2s}
  .header-user:hover{background:#f1f5f9}
  .header-user .avatar{width:32px;height:32px;border-radius:50%;background:#475569;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .header-user .uname{font-size:13px;color:#334155;font-weight:500}
  .header-user .arrow{font-size:10px;color:#94a3b8;margin-left:2px}
  .user-dropdown{position:absolute;top:46px;right:0;width:160px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden;display:none;z-index:50}
  .user-dropdown.show{display:block}
  .user-dropdown .dd-item{padding:10px 16px;font-size:13px;color:#334155;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
  .user-dropdown .dd-item:hover{background:#f1f5f9}
  .user-dropdown .dd-item.danger{color:#ef4444}

  /* ---- 内容区域 ---- */
  .content{flex:1;padding:20px;overflow-y:auto;background:#f1f5f9}
  .panel{display:none;animation:fadeIn .25s ease}
  .panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  /* ---- 通用组件 ---- */
  .card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:16px}
  .card-header{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
  .card-header .card-title{font-size:14px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:8px}
  .card-header .card-title::before{content:"";width:4px;height:16px;background:#475569;border-radius:2px}
  .card-body{padding:20px}

  .btn{padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit;line-height:1.4}
  .btn-primary{background:#475569;color:#fff;border-color:#475569}
  .btn-primary:hover{background:#334155;border-color:#334155}
  .btn-outline{background:#fff;color:#475569;border-color:#cbd5e1}
  .btn-outline:hover{background:#f8fafc;border-color:#94a3b8}
  .btn-sm{padding:4px 10px;font-size:12px}
  .btn-xs{padding:2px 8px;font-size:11px;border-radius:4px}
  .btn-danger-text{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:2px 6px}
  .btn-danger-text:hover{color:#dc2626;text-decoration:underline}
  .btn-text{background:none;border:none;color:#475569;cursor:pointer;font-size:12px;padding:2px 6px}
  .btn-text:hover{color:#1e293b;text-decoration:underline}

  /* ---- 数据字典 ---- */
  .dict-container{display:flex;gap:0;height:calc(100vh - 200px)}
  .dict-left{width:220px;min-width:220px;border-right:1px solid #e2e8f0;overflow-y:auto;background:#fff}
  .dict-left .dict-search{padding:12px}
  .dict-left .dict-search input{width:100%;padding:7px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155}
  .dict-left .dict-search input:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .dict-left .dict-cat{padding:10px 16px;font-size:13px;color:#475569;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
  .dict-left .dict-cat:hover{background:#f1f5f9}
  .dict-left .dict-cat.active{background:#f1f5f9;border-left-color:#475569;color:#1e293b;font-weight:600}
  .dict-left .dict-cat .count{font-size:11px;color:#94a3b8;background:#f1f5f9;padding:1px 7px;border-radius:10px}
  .dict-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .dict-right-header{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#fafbfc}
  .dict-right-header .dict-name{font-size:14px;font-weight:600;color:#1e293b}
  .dict-right-body{flex:1;overflow-y:auto;padding:0}
  .dict-table{width:100%;border-collapse:collapse;font-size:13px}
  .dict-table th,.dict-table td{padding:10px 14px;text-align:left;border-bottom:1px solid #f1f5f9}
  .dict-table th{background:#f8fafc;color:#64748b;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0}
  .dict-table tbody tr:hover td{background:#f8fafc}
  .dict-table .status-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500}
  .dict-table .status-tag.enabled{background:#ecfdf5;color:#059669}
  .dict-table .status-tag.disabled{background:#fef2f2;color:#dc2626}
  .dict-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:13px}

  /* ---- 弹窗 ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:12px;width:480px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-header{padding:16px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
  .modal-header .modal-title{font-size:15px;font-weight:600;color:#1e293b}
  .modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;transition:all .15s}
  .modal-close:hover{background:#f1f5f9;color:#475569}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:12px 24px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end}
  .form-group{margin-bottom:16px}
  .form-group:last-child{margin-bottom:0}
  .form-group label{display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:5px}
  .form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155;background:#fff}
  .form-group input:focus,.form-group select:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .form-row{display:flex;gap:12px}
  .form-row .form-group{flex:1}

  /* ---- Toast ---- */
  .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:toastIn .3s ease;pointer-events:none}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ---- 滚动条 ---- */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#94a3b8}

  .text-muted{color:#94a3b8;font-size:12px}
  .mt-4{margin-top:16px}
  .flex-between{display:flex;align-items:center;justify-content:space-between}

  /* ---- 学科管理 树结构 ---- */
  .xueke-container{display:flex;flex:1;overflow:hidden}
  .xueke-tree{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#fff}
  .xueke-tree-search{padding:12px}
  .xueke-tree-search input{width:100%;padding:7px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155}
  .xueke-tree-search input:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .xueke-tree-list{flex:1;overflow-y:auto;padding:4px 0}

  /* 树节点 */
  .tree-node{cursor:pointer;user-select:none}
  .tree-node-row{display:flex;align-items:center;padding:7px 12px;gap:6px;transition:background .15s;border-left:3px solid transparent;font-size:13px;color:#334155}
  .tree-node-row:hover{background:#f1f5f9}
  .tree-node-row:hover .tree-node-actions{opacity:1}
  .tree-node-row.selected{background:#f1f5f9;border-left-color:#475569;color:#1e293b;font-weight:600}
  .tree-node-row .node-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:10px;flex-shrink:0;transition:transform .2s}
  .tree-node-row .node-arrow.expanded{transform:rotate(90deg)}
  .tree-node-row .node-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tree-node-row .node-icon svg{width:14px;height:14px}
  .tree-node-row .node-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tree-node-row .node-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500;flex-shrink:0}
  .tree-node-row .node-badge.subject{background:#f1f5f9;color:#475569}
  .tree-node-row .node-badge.sub-subject{background:#eff6ff;color:#2563eb}
  .tree-node-row .node-badge.stage{background:#f0fdf4;color:#059669}
  .tree-node-row.level-1{padding-left:12px}
  .tree-node-row.level-2{padding-left:36px}
  .tree-node-row.level-3{padding-left:60px}
  .tree-node-children{overflow:hidden;transition:max-height .25s ease}
  .tree-node-children.collapsed{max-height:0}
  .tree-node-children.expanded{max-height:600px}

  /* 树节点内联操作按钮 */
  .tree-node-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
  .tree-node-actions .act-btn{width:24px;height:24px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#94a3b8;transition:all .15s}
  .tree-node-actions .act-btn:hover{background:#e2e8f0;color:#475569}
  .tree-node-actions .act-btn.del:hover{background:#fef2f2;color:#ef4444}
  .tree-node-actions .act-btn.add:hover{background:#ecfdf5;color:#059669}
  .tree-node-actions .act-btn svg{width:13px;height:13px}

  /* 弹窗 */
  .xueke-modal .modal{width:440px}

  /* 空状态提示 */
  .xueke-tree-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:#94a3b8;font-size:13px;gap:8px}

  /* ---- 账号管理 & 角色管理 通用 ---- */
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px}
  .toolbar-left{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .toolbar-right{display:flex;gap:10px;align-items:center}
  .search-input{width:220px;padding:7px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;color:#334155}
  .search-input:focus{border-color:#475569;box-shadow:0 0 0 2px rgba(71,85,105,.1)}
  .data-table-wrap{overflow-x:auto;max-height:calc(100vh - 260px);overflow-y:auto}
  .data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
  .data-table th,.data-table td{padding:10px 14px;text-align:left;border-bottom:1px solid #f1f5f9}
  .data-table th{background:#f8fafc;color:#64748b;font-weight:600;font-size:12px;position:sticky;top:0;z-index:1;white-space:nowrap}
  .data-table tbody tr:hover td{background:#f8fafc}
  .data-table .tag-role{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:500;background:#eff6ff;color:#2563eb}
  .data-table .tag-role.super{background:#fef2f2;color:#dc2626}
  .data-table .tag-status{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500}
  .data-table .tag-status.enabled{background:#ecfdf5;color:#059669}
  .data-table .tag-status.disabled{background:#fef2f2;color:#dc2626}
  .data-table .text-mono{font-family:"SF Mono","Fira Code",monospace;font-size:12px;color:#64748b}
  .data-table .col-actions{white-space:nowrap;width:100px}

  /* 角色弹窗更大 */
  .role-modal .modal{width:640px}

  /* 权限分组 */
  .perm-group{margin-bottom:18px}
  .perm-group-title{font-size:13px;font-weight:600;color:#334155;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:6px}
  .perm-group-title::before{content:"";width:3px;height:14px;background:#475569;border-radius:2px}
  .perm-group-items{display:flex;flex-wrap:wrap;gap:6px 16px}
  .perm-group-items label{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#475569;cursor:pointer;padding:3px 0}
  .perm-group-items input[type="checkbox"]{accent-color:#475569;width:15px;height:15px;cursor:pointer}

  /* 学区选择 */
  .district-list{display:flex;flex-wrap:wrap;gap:6px 16px;max-height:160px;overflow-y:auto;padding:8px 0}
  .district-list label{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#475569;cursor:pointer;padding:3px 0}
  .district-list input[type="checkbox"]{accent-color:#475569;width:15px;height:15px;cursor:pointer}
  .district-select-all{margin-bottom:6px}
  .district-select-all button{font-size:11px;color:#475569;background:none;border:none;cursor:pointer;padding:2px 0}
  .district-select-all button:hover{color:#1e293b;text-decoration:underline}

  /* 角色弹窗内已选标签 */
  .selected-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .selected-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;background:#f1f5f9;color:#475569}
  .selected-tag .remove-tag{cursor:pointer;font-size:13px;line-height:1;color:#94a3b8;margin-left:2px}
  .selected-tag .remove-tag:hover{color:#ef4444}

  /* 弹窗内提示 */
  .modal-hint{font-size:12px;color:#94a3b8;margin-top:4px}

  /* 开关切换 */
  .switch-toggle{position:relative;display:inline-block;width:36px;height:20px}
  .switch-toggle input{opacity:0;width:0;height:0}
  .switch-toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:20px;transition:.25s}
  .switch-toggle .slider::before{content:"";position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
  .switch-toggle input:checked+.slider{background:#475569}
  .switch-toggle input:checked+.slider::before{transform:translateX(16px)}
  .switch-toggle.disabled{opacity:.45;pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <!-- ===== 左侧边栏 ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">研</div>
      <div class="logo-text">考研学习平台</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-panel="xuequ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        学区管理
      </div>
      <div class="nav-item" data-panel="xueke">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        学科管理
      </div>
      <div class="nav-item" data-panel="account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        账号管理
      </div>
      <div class="nav-item" data-panel="role">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        角色管理
      </div>
      <div class="nav-item" data-panel="dict">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        数据字典
      </div>
    </nav>
  </aside>

  <!-- ===== 右侧主区域 ===== -->
  <div class="main">
    <!-- 顶部栏 -->
    <header class="header">
      <div class="header-breadcrumb">
        考研学习平台 <span>/ 系统设置</span>
      </div>
      <div class="header-right">
        <button class="header-btn" title="消息通知">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge">3</span>
        </button>
        <div class="header-user" onclick="toggleUserDropdown(event)">
          <div class="avatar">超</div>
          <span class="uname">超级管理员</span>
          <span class="arrow">&#9660;</span>
          <div class="user-dropdown" id="userDropdown">
            <div class="dd-item" onclick="event.stopPropagation();showToast('修改密码功能')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              修改密码
            </div>
            <div class="dd-item danger" onclick="event.stopPropagation();showToast('已退出登录')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              退出登录
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- 内容区域 -->

  currentPanel = panel;

}

}

    div.className = 'dict-cat';
    div.setAttribute('data-cat',cat);
    div.innerHTML = cat + ' <span class="count">' + dictData[cat].length + '</span>';
    div.addEventListener('click',function(){
      selectDictCategory(cat);
    });
    list.appendChild(div);
  });
}

  var kw = keyword.toLowerCase();
  items.forEach(function(item){
    var cat = item.getAttribute('data-cat');
    if(!kw || cat.toLowerCase().includes(kw)){
      item.style.display = 'flex';
    }else{
      item.style.display = 'none';
    }
  });
}
function selectDictCategory(cat){
  currentDictCategory = cat;
  // 更新左侧激活
  document.querySelectorAll('#dictCategoryList .dict-cat').forEach(function(el){el.classList.remove('active')});
  document.querySelector('#dictCategoryList .dict-cat[data-cat="'+cat+'"]').classList.add('active');
  // 更新右侧标题
  document.getElementById('dictCurrentName').textContent = cat;
  document.getElementById('btnAddDictItem').style.display = 'inline-flex';
  // 渲染表格
  renderDictTable(cat);
}
function renderDictTable(cat){
  var area = document.getElementById('dictTableArea');
  var items = dictData[cat] || [];
  if(items.length===0){
    area.innerHTML = '<div class="dict-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span style="margin-top:8px">暂无枚举项数据</span></div>';
    return;
  }
  var html = '<table class="dict-table"><thead><tr><th>枚举值</th><th>显示名称</th><th>排序号</th><th>状态</th><th style="width:120px">操作</th></tr></thead><tbody>';
  items.forEach(function(item,i){
    var statusClass = item.status==='enabled'?'enabled':'disabled';
    var statusText = item.status==='enabled'?'启用':'停用';
    html += '<tr>';
    html += '<td style="font-family:monospace;color:#475569;font-weight:500">'+item.code+'</td>';
    html += '<td>'+item.name+'</td>';
    html += '<td style="color:#94a3b8">'+item.sort+'</td>';
    html += '<td><span class="status-tag '+statusClass+'">'+statusText+'</span></td>';
    html += '<td>';
    html += '<button class="btn-text" onclick="editDictItem(\''+cat+'\','+i+')">编辑</button>';
    if(item.status==='enabled'){
      html += '<button class="btn-danger-text" onclick="toggleDictItem(\''+cat+'\','+i+')">停用</button>';
    }else{
      html += '<button class="btn-text" style="color:#059669" onclick="toggleDictItem(\''+cat+'\','+i+')">启用</button>';
    }
    html += '</td></tr>';
  });
  html += '</tbody></table>';
  area.innerHTML = html;
}
function openDictModal(cat,editIndex){
  if(!currentDictCategory){showToast('请先选择字典类别');return;}
  document.getElementById('dictModalEditIndex').value = (editIndex!==undefined)?editIndex:-1;
  if(editIndex!==undefined&&editIndex>=0){
    document.getElementById('dictModalTitle').textContent = '编辑枚举项';
    var item = dictData[currentDictCategory][editIndex];
    document.getElementById('dictModalCode').value = item.code;
    document.getElementById('dictModalName').value = item.name;
    document.getElementById('dictModalSort').value = item.sort;
    document.getElementById('dictModalStatus').value = item.status;

    document.getElementById('dictModalTitle').textContent = '新增枚举项';
    document.getElementById('dictModalCode').value = '';

function editDictItem(cat,index){
  currentDictCategory = cat;
  selectDictCategory(cat);
  openDictModal(cat,index);

  document.getElementById('dictModalOverlay').classList.remove('show');
}
function saveDictItem(){
  var code = document.getElementById('dictModalCode').value.trim();
  var name = document.getElementById('dictModalName').value.trim();
  var sort = parseInt(document.getElementById('dictModalSort').value)||1;
  var status = document.getElementById('dictModalStatus').value;
  var editIndex = parseInt(document.getElementById('dictModalEditIndex').value);

  if(!code){showToast('请输入枚举值');return;}
  if(!name){showToast('请输入显示名称');return;}

  if(editIndex>=0){
    dictData[currentDictCategory][editIndex] = {code:code,name:name,sort:sort,status:status};
    showToast('枚举项已更新');
  }else{
    // 检查重复
    var exists = dictData[currentDictCategory].some(function(item){return item.code===code;});
    if(exists){showToast('枚举值已存在');return;}
    dictData[currentDictCategory].push({code:code,name:name,sort:sort,status:status});
    showToast('枚举项已新增');
  }
  closeDictModal();
  // 刷新
  selectDictCategory(currentDictCategory);

function toggleDictItem(cat,index){

  showToast('枚举项已'+(item.status==='enabled'?'启用':'停用'));
  renderDictTable(cat);
  // 更新计数
  updateDictCount(cat);
}
function updateDictCount(cat){
  var el = document.querySelector('#dictCategoryList .dict-cat[data-cat="'+cat+'"] .count');
  if(el) el.textContent = dictData[cat].length;
}

function initXuekeTree(){
  // 默认展开所有学科
  xuekeData.forEach(function(subj){ xuekeExpandedIds[subj.id] = true; });
  renderXuekeTree();
}
function findNodeById(data, id){
  for(var i=0;i<data.length;i++){
    if(data[i].id===id) return data[i];
    if(data[i].children&&data[i].children.length>0){
      var found = findNodeById(data[i].children, id);
      if(found) return found;
    }
  }
  return null;
}
function findParentNode(data, childId){
  for(var i=0;i<data.length;i++){
    if(data[i].children){
      for(var j=0;j<data[i].children.length;j++){
        if(data[i].children[j].id===childId) return data[i];
        var found = findParentNode(data[i].children, childId);
        if(found) return found;
      }
    }
  }
  return null;
}
function deleteNodeById(data, id){
  for(var i=0;i<data.length;i++){
    if(data[i].id===id){ data.splice(i,1); return true; }
    if(data[i].children&&data[i].children.length>0){
      if(deleteNodeById(data[i].children, id)) return true;
    }
  }
  return false;
}
function getNodeLevel(data, id, level){
  if(level===undefined) level=0;
  for(var i=0;i<data.length;i++){
    if(data[i].id===id) return level;
    if(data[i].children&&data[i].children.length>0){
      var found = getNodeLevel(data[i].children, id, level+1);
      if(found>=0) return found;
    }
  }
  return -1;
}
function countChildren(node, type){
  if(!node.children) return 0;
  if(!type) return node.children.length;
  var cnt=0;
  node.children.forEach(function(c){ if(c.type===type) cnt++; });
  return cnt;
}
function renderXuekeTree(filterKeyword){
  var treeList = document.getElementById('xuekeTreeList');
  if(xuekeData.length===0){
    treeList.innerHTML = '<div class="xueke-tree-empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>暂无学科，请新增</span></div>';
    return;
  }
  var kw = (filterKeyword||'').trim().toLowerCase();
  var html = '';
  xuekeData.forEach(function(subj){
    var result = renderTreeNode(subj, 0, kw);
    if(result.html) html += result.html;
  });
  treeList.innerHTML = html || '<div class="xueke-tree-empty"><span>无匹配结果</span></div>';
}
function renderTreeNode(node, level, kw){
  var hasChildren = node.children && node.children.length>0;
  var isExpanded = xuekeExpandedIds[node.id] || !!kw;
  var isSelected = xuekeSelectedId === node.id;
  var typeLabel = node.type==='subject'?'学科':(node.type==='sub_subject'?'子科目':'课程阶段');
  var badgeClass = node.type==='subject'?'subject':(node.type==='sub_subject'?'sub-subject':'stage');
  var arrowHtml = hasChildren
    ? ('<span class="node-arrow'+(isExpanded?' expanded':'')+'">&#9654;</span>')
    : '<span class="node-arrow" style="visibility:hidden"></span>';
  var iconHtml = '';
  if(node.type==='subject'){
    iconHtml = '<span class="node-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>';
  }else if(node.type==='sub_subject'){
    iconHtml = '<span class="node-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>';
  }else{
    iconHtml = '<span class="node-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg></span>';
  }
  var nameMatch = !kw || node.name.toLowerCase().includes(kw);
  var childMatch = false;
  var childrenHtml = '';
  if(hasChildren){
    var childParts = [];
    node.children.forEach(function(child){
      var cr = renderTreeNode(child, level+1, kw);
      if(cr.html) childParts.push(cr.html);
      if(cr.match) childMatch = true;
    });
    if(childParts.length>0){
      childrenHtml = '<div class="tree-node-children'+(isExpanded?' expanded':' collapsed')+'">'+childParts.join('')+'</div>';
    }
  }
  if(kw && !nameMatch && !childMatch) return {html:'',match:false};
  var html = '<div class="tree-node" data-id="'+node.id+'">';
  html += '<div class="tree-node-row level-'+(level+1)+(isSelected?' selected':'')+'" onclick="selectXuekeNode(\''+node.id+'\');toggleXuekeNode(event,\''+node.id+'\')">';
  html += arrowHtml;
  html += iconHtml;
  html += '<span class="node-label">'+node.name+'</span>';
  html += '<span class="node-badge '+badgeClass+'">'+typeLabel+'</span>';
  // 内联操作按钮
  html += '<span class="tree-node-actions" onclick="event.stopPropagation()">';
  if(node.type==='sub_subject'){
    html += '<button class="act-btn add" title="新增课程阶段" onclick="addNodeUnder(\''+node.id+'\',\'stage\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>';
  }else if(node.type==='stage'){
    html += '<button class="act-btn" title="编辑" onclick="editNodeById(\''+node.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
    html += '<button class="act-btn del" title="删除" onclick="deleteNodeByIdAction(\''+node.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>';
  }
  html += '</span>';
  html += '</div>';
  html += childrenHtml;
  html += '</div>';
  return {html:html,match:true};
}
function toggleXuekeNode(e, id){
  if(e.target.closest('.tree-node-actions')) return;
  if(e.target.closest('.node-arrow')){
    e.stopPropagation();
    xuekeExpandedIds[id] = !xuekeExpandedIds[id];
    renderXuekeTree(document.getElementById('xuekeSearchInput').value);
    return;
  }
}
function selectXuekeNode(id){
  xuekeSelectedId = id;
  renderXuekeTree(document.getElementById('xuekeSearchInput').value);
}
function filterXuekeTree(val){
  renderXuekeTree(val);
}

  openXuekeModal('add', null, 'subject', null);
}
function addNodeUnder(parentId, childType){
  var parent = findNodeById(xuekeData, parentId);
  if(!parent) return;
  openXuekeModal('add', parentId, childType, parent.name);
}
function editNodeById(id){
  var node = findNodeById(xuekeData, id);
  if(!node) return;
  var parent = findParentNode(xuekeData, id);
  openXuekeModal('edit', id, node.type, parent?parent.name:null, node.name);
}
function deleteNodeByIdAction(id){
  var node = findNodeById(xuekeData, id);
  if(!node) return;
  var childCount = node.children?node.children.length:0;
  var confirmMsg = '确定删除"'+node.name+'"吗？';
  if(childCount>0) confirmMsg += '\n该节点下有 '+childCount+' 个子节点，将一并删除。';
  if(!confirm(confirmMsg)) return;
  deleteNodeById(xuekeData, id);
  if(xuekeSelectedId===id) xuekeSelectedId = null;
  renderXuekeTree(document.getElementById('xuekeSearchInput').value);
  showToast('已删除');
}
function openXuekeModal(mode, parentId, nodeType, parentName, nodeName){
  document.getElementById('xuekeModalMode').value = mode;
  document.getElementById('xuekeModalParentId').value = parentId||'';
  document.getElementById('xuekeModalType').value = nodeType;
  var typeLabel = nodeType==='subject'?'学科':(nodeType==='sub_subject'?'子科目':'课程阶段');
  document.getElementById('xuekeModalTypeLabel').value = typeLabel;

  if(mode==='edit'){
    document.getElementById('xuekeModalTitle').textContent = '编辑'+typeLabel;
    document.getElementById('xuekeModalNodeId').value = xuekeSelectedId||'';
    document.getElementById('xuekeModalName').value = nodeName||'';
  }else{
    document.getElementById('xuekeModalTitle').textContent = '新增'+typeLabel;
    document.getElementById('xuekeModalNodeId').value = '';
    document.getElementById('xuekeModalName').value = '';
  }

  if(parentName){
    document.getElementById('xuekeModalParentGroup').style.display = 'block';
    document.getElementById('xuekeModalParentName').value = parentName;
  }else{
    document.getElementById('xuekeModalParentGroup').style.display = 'none';
  }

  document.getElementById('xuekeModalOverlay').classList.add('show');
  setTimeout(function(){ document.getElementById('xuekeModalName').focus(); },100);
}
function closeXuekeModal(){
  document.getElementById('xuekeModalOverlay').classList.remove('show');
}
function saveXuekeNode(){
  var mode = document.getElementById('xuekeModalMode').value;
  var name = document.getElementById('xuekeModalName').value.trim();
  var nodeType = document.getElementById('xuekeModalType').value;
  var parentId = document.getElementById('xuekeModalParentId').value;

  if(!name){ showToast('请输入名称'); return; }

  if(mode==='add'){
    var newNode = {
      id: nodeType+'_'+Date.now(),
      name: name,
      type: nodeType,
      parentId: parentId||null,
      children: (nodeType==='subject'||nodeType==='sub_subject')?[]:undefined
    };
    if(parentId){
      var parent = findNodeById(xuekeData, parentId);
      if(parent){
        if(!parent.children) parent.children = [];
        parent.children.push(newNode);
        xuekeExpandedIds[parentId] = true;
      }
    }else{
      xuekeData.push(newNode);
      xuekeExpandedIds[newNode.id] = true;
    }
    showToast('已新增：'+name);
  }else{
    var editId = document.getElementById('xuekeModalNodeId').value;
    var node = findNodeById(xuekeData, editId);
    if(node){
      node.name = name;
      showToast('已更新：'+name);
    }
  }

  closeXuekeModal();
  if(mode==='add'&&parentId){
    xuekeSelectedId = parentId;
  }
  renderXuekeTree(document.getElementById('xuekeSearchInput').value);
}

  {
    name:'超级管理员',
    perms:['学员管理','班级管理','课程安排','考试管理','题目录入','题目审核','试卷组卷','试卷审核','数据字典','系统参数'],
    districts:['海淀区','朝阳区','丰台区','石景山区','西城区','东城区','通州区','大兴区','昌平区','顺义区','房山区','门头沟区','怀柔区','平谷区','密云区','延庆区'],
    createdAt:'2026-01-01 10:00:00'
  },
  {
    name:'教务管理员',
    perms:['学员管理','班级管理','课程安排','考试管理'],
    districts:['海淀区','朝阳区','西城区','东城区'],
    createdAt:'2026-03-15 14:30:00'
  },
  {
    name:'教研员',
    perms:['题目录入','题目审核','试卷组卷','试卷审核'],
    districts:['海淀区','朝阳区','丰台区'],
    createdAt:'2026-04-20 09:15:00'
  }
];

function getAccountCountByRole(roleName){
  return accountData.filter(function(a){return a.role===roleName;}).length;
}

function renderAccountTable(){
  var kw = (document.getElementById('accountSearch').value||'').trim().toLowerCase();
  var filtered = accountData.filter(function(a){
    if(!kw) return true;
    return a.username.toLowerCase().includes(kw) || a.realname.toLowerCase().includes(kw) || a.role.toLowerCase().includes(kw);
  });
  var tbody = document.getElementById('accountTableBody');
  document.getElementById('accountCount').textContent = accountData.length;
  if(filtered.length===0){
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#94a3b8">暂无匹配的账号数据</td></tr>';
    return;
  }
  var html = '';
  filtered.forEach(function(acc,i){
    var origIdx = accountData.indexOf(acc);
    var roleClass = acc.role==='超级管理员'?'tag-role super':'tag-role';
    var statusClass = acc.status==='enabled'?'tag-status enabled':'tag-status disabled';
    var statusText = acc.status==='enabled'?'启用':'停用';
    html += '<tr>';
    html += '<td class="text-mono"><b>'+acc.username+'</b></td>';
    html += '<td>'+acc.realname+'</td>';
    html += '<td><span class="'+roleClass+'">'+acc.role+'</span></td>';
    html += '<td><span class="'+statusClass+'">'+statusText+'</span></td>';
    html += '<td style="color:#94a3b8;font-size:12px">'+acc.createdAt+'</td>';
    html += '<td class="col-actions">';
    html += '<button class="btn-text" onclick="editAccount('+origIdx+')">编辑</button>';
    if(acc.username!=='admin'){
      html += '<button class="btn-danger-text" onclick="deleteAccount('+origIdx+')">删除</button>';
    }
    html += '</td></tr>';
  });
  tbody.innerHTML = html;
}

function renderRoleTable(){
  var kw = (document.getElementById('roleSearch').value||'').trim().toLowerCase();
  var filtered = roleData.filter(function(r){
    if(!kw) return true;
    return r.name.toLowerCase().includes(kw);
  });
  var tbody = document.getElementById('roleTableBody');
  document.getElementById('roleCount').textContent = roleData.length;
  if(filtered.length===0){
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#94a3b8">暂无匹配的角色数据</td></tr>';
    return;
  }
  var html = '';
  filtered.forEach(function(role,i){
    var origIdx = roleData.indexOf(role);
    var districtText = role.districts.length===0?'全部学区':(role.districts.length<=3?role.districts.join('、'):role.districts.slice(0,3).join('、')+' 等'+role.districts.length+'个学区');
    var acctCount = getAccountCountByRole(role.name);
    html += '<tr>';
    html += '<td style="font-weight:600">'+role.name+'</td>';
    html += '<td><span class="tag-role">'+role.perms.length+' 项</span></td>';
    html += '<td style="color:#475569;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+role.districts.join('、')+'">'+districtText+'</td>';
    html += '<td style="color:#94a3b8">'+acctCount+'</td>';
    html += '<td style="color:#94a3b8;font-size:12px">'+role.createdAt+'</td>';
    html += '<td class="col-actions">';
    html += '<button class="btn-text" onclick="editRole('+origIdx+')">编辑</button>';
    if(role.name!=='超级管理员'){
      html += '<button class="btn-danger-text" onclick="deleteRole('+origIdx+')">删除</button>';
    }
    html += '</td></tr>';
  });
  tbody.innerHTML = html;
}

// ==================== 账号弹窗 ====================
function openAccountModal(editIndex){
  // 刷新角色下拉
  var sel = document.getElementById('accountModalRole');
  sel.innerHTML = '<option value="">请选择角色</option>';
  roleData.forEach(function(r){
    sel.innerHTML += '<option value="'+r.name+'">'+r.name+'</option>';
  });

  document.getElementById('accountModalEditIndex').value = (editIndex!==undefined)?editIndex:-1;
  if(editIndex!==undefined&&editIndex>=0){
    document.getElementById('accountModalTitle').textContent = '编辑账号';
    var acc = accountData[editIndex];
    document.getElementById('accountModalUsername').value = acc.username;
    document.getElementById('accountModalUsername').disabled = true;
    document.getElementById('accountModalRealname').value = acc.realname;
    document.getElementById('accountModalRole').value = acc.role;
    document.getElementById('accountModalStatus').value = acc.status;
    document.getElementById('accountModalPwdRow').style.display = 'none';
  }else{
    document.getElementById('accountModalTitle').textContent = '新增账号';
    document.getElementById('accountModalUsername').value = '';
    document.getElementById('accountModalUsername').disabled = false;
    document.getElementById('accountModalRealname').value = '';
    document.getElementById('accountModalPassword').value = '';
    document.getElementById('accountModalPassword2').value = '';
    document.getElementById('accountModalRole').value = '';
    document.getElementById('accountModalStatus').value = 'enabled';
    document.getElementById('accountModalPwdRow').style.display = 'flex';
  }
  document.getElementById('accountModalOverlay').classList.add('show');
}
function editAccount(index){
  openAccountModal(index);
}
function closeAccountModal(){
  document.getElementById('accountModalOverlay').classList.remove('show');
}
function saveAccount(){
  var username = document.getElementById('accountModalUsername').value.trim();
  var realname = document.getElementById('accountModalRealname').value.trim();
  var password = document.getElementById('accountModalPassword').value;
  var password2 = document.getElementById('accountModalPassword2').value;
  var role = document.getElementById('accountModalRole').value;
  var status = document.getElementById('accountModalStatus').value;
  var editIndex = parseInt(document.getElementById('accountModalEditIndex').value);

  if(!username){showToast('请输入账号');return;}
  if(!realname){showToast('请输入姓名');return;}
  if(!role){showToast('请选择所属角色');return;}

  if(editIndex>=0){
    // 编辑
    accountData[editIndex].realname = realname;
    accountData[editIndex].role = role;
    accountData[editIndex].status = status;
    showToast('账号已更新');
  }else{
    if(!password){showToast('请输入密码');return;}
    if(password!==password2){showToast('两次密码不一致');return;}
    // 查重
    var exists = accountData.some(function(a){return a.username===username;});
    if(exists){showToast('账号已存在');return;}
    accountData.push({
      username:username,
      realname:realname,
      role:role,
      status:status,
      createdAt:new Date().toISOString().replace('T',' ').slice(0,19)
    });
    showToast('账号已新增');
  }
  closeAccountModal();
  renderAccountTable();
  renderRoleTable(); // 刷新角色表中的关联账号数
}

function deleteAccount(index){
  var acc = accountData[index];
  if(acc.username==='admin'){showToast('不可删除超级管理员账号');return;}
  if(!confirm('确定删除账号"'+acc.username+'（'+acc.realname+'）"吗？此操作不可恢复。')) return;
  accountData.splice(index,1);
  renderAccountTable();
  renderRoleTable();
  showToast('账号已删除');
}

// ==================== 角色弹窗 ====================
function renderRolePermGroups(checkedPerms){
  var container = document.getElementById('rolePermGroups');
  if(!checkedPerms) checkedPerms = [];
  var html = '';
  permMenuData.forEach(function(group){
    html += '<div class="perm-group">';
    html += '<div class="perm-group-title">'+group.group+'</div>';
    html += '<div class="perm-group-items">';
    group.items.forEach(function(perm){
      var checked = checkedPerms.indexOf(perm)>=0?'checked':'';
      html += '<label><input type="checkbox" class="role-perm-check" value="'+perm+'" '+checked+'> '+perm+'</label>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function renderRoleDistrictList(checkedDistricts){
  var container = document.getElementById('roleDistrictList');
  if(!checkedDistricts) checkedDistricts = [];
  var html = '';
  districtData.forEach(function(d){
    var checked = checkedDistricts.indexOf(d)>=0?'checked':'';
    html += '<label><input type="checkbox" class="role-district-check" value="'+d+'" '+checked+'> '+d+'</label>';
  });
  container.innerHTML = html;
}

function roleToggleAllDistricts(){
  var checks = document.querySelectorAll('.role-district-check');
  if(!checks.length) return;
  var allChecked = true;
  checks.forEach(function(cb){if(!cb.checked) allChecked=false;});
  checks.forEach(function(cb){cb.checked = !allChecked;});
}

function openRoleModal(editIndex){
  document.getElementById('roleModalEditIndex').value = (editIndex!==undefined)?editIndex:-1;
  if(editIndex!==undefined&&editIndex>=0){
    document.getElementById('roleModalTitle').textContent = '编辑角色';
    var role = roleData[editIndex];
    document.getElementById('roleModalName').value = role.name;
    document.getElementById('roleModalName').disabled = (role.name==='超级管理员');
    renderRolePermGroups(role.perms);
    renderRoleDistrictList(role.districts);
  }else{
    document.getElementById('roleModalTitle').textContent = '新增角色';
    document.getElementById('roleModalName').value = '';
    document.getElementById('roleModalName').disabled = false;
    renderRolePermGroups([]);
    renderRoleDistrictList([]);
  }
  document.getElementById('roleModalOverlay').classList.add('show');
}
function editRole(index){
  openRoleModal(index);
}
function closeRoleModal(){
  document.getElementById('roleModalOverlay').classList.remove('show');
}
function saveRole(){
  var name = document.getElementById('roleModalName').value.trim();
  var editIndex = parseInt(document.getElementById('roleModalEditIndex').value);
  if(!name){showToast('请输入角色名称');return;}

  // 收集选中的权限
  var permChecks = document.querySelectorAll('.role-perm-check:checked');
  var perms = [];
  permChecks.forEach(function(cb){perms.push(cb.value);});

  // 收集选中的学区
  var districtChecks = document.querySelectorAll('.role-district-check:checked');
  var districts = [];
  districtChecks.forEach(function(cb){districts.push(cb.value);});

  if(perms.length===0){showToast('请至少选择一项菜单权限');return;}

  if(editIndex>=0){
    roleData[editIndex].perms = perms;
    roleData[editIndex].districts = districts;
    // 更新关联账号的 role 名称
    var oldName = roleData[editIndex].name;
    roleData[editIndex].name = name;
    accountData.forEach(function(acc){
      if(acc.role===oldName) acc.role = name;
    });
    showToast('角色已更新');
  }else{
    var exists = roleData.some(function(r,i){return i!==editIndex && r.name===name;});
    if(exists){showToast('角色名称已存在');return;}
    roleData.push({
      name:name,
      perms:perms,
      districts:districts,
      createdAt:new Date().toISOString().replace('T',' ').slice(0,19)
    });
    showToast('角色已新增');
  }
  closeRoleModal();
  renderRoleTable();
  renderAccountTable();
}

function deleteRole(index){
  var role = roleData[index];
  if(role.name==='超级管理员'){showToast('不可删除超级管理员角色');return;}
  var linkedCount = getAccountCountByRole(role.name);
  var msg = '确定删除角色"'+role.name+'"吗？';
  if(linkedCount>0) msg += '\n当前有 '+linkedCount+' 个账号关联此角色，删除后这些账号将失去角色归属。';
  if(!confirm(msg)) return;
  roleData.splice(index,1);
  renderRoleTable();
  renderAccountTable();
  showToast('角色已删除');
}

// 初始化账号/角色表格
function initAccountAndRole(){
  renderAccountTable();
  renderRoleTable();
}
</script>
